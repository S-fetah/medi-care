<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Hub | Medi-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .card.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        
        select option {
            background: #1e293b;
            color: white;
        }

        input[type="file"] {
            padding: 0.5rem;
            background: rgba(15, 23, 42, 0.4);
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 1rem;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary-hover);
        }

        button.submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        button.submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .response-container {
            margin-top: 2rem;
            background: #0f172a;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .response-header {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-success { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        pre {
            padding: 1.5rem;
            margin: 0;
            overflow-x: auto;
            color: #a78bfa;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Test Hub</h1>
        
        <!-- Config Section -->
        <div class="card active" style="margin-bottom: 2rem; padding: 1.5rem;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="baseUrl">Base API URL</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="http://localhost:3000" style="flex: 1;">
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'cert')">Certificate Upload</button>
            <button class="tab-btn" onclick="switchTab(event, 'signup')">Sign Up</button>
            <button class="tab-btn" onclick="switchTab(event, 'login')">Login</button>
        </div>

        <!-- Doctor Certificate Upload -->
        <div id="cert" class="card">
            <h2 style="margin-bottom: 1.5rem; font-weight: 500;">Test Doctor Certificate Upload</h2>
            <form id="certForm" onsubmit="handleCertUpload(event)">
                <div class="form-group">
                    <label for="certFile">Select Certificate (PDF, Image)</label>
                    <input type="file" id="certFile" name="file" required>
                </div>
                <button type="submit" class="submit-btn" id="certBtn">
                    <span class="btn-text">Upload Certificate</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Sign Up -->
        <div id="signup" class="card">
            <h2 style="margin-bottom: 1.5rem; font-weight: 500;">Test User Registration</h2>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Dr. John Doe">
                </div>
                <div class="form-group">
                    <label for="emailSignup">Email Address</label>
                    <input type="email" id="emailSignup" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="passwordSignup">Password</label>
                    <input type="password" id="passwordSignup" name="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="userType">User Type</label>
                    <select id="userType" name="userType" onchange="toggleSpeciality(this.value)">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                    </select>
                </div>
                <div class="form-group" id="specialityGroup" style="display: none;">
                    <label for="speciality">Speciality</label>
                    <input type="text" id="speciality" name="speciality" placeholder="e.g., Cardiologist">
                </div>
                <div class="form-group" id="signupFileGroup" style="display: none;">
                    <label for="signupFile">Doctor Certificate</label>
                    <input type="file" id="signupFile" name="file">
                </div>
                <button type="submit" class="submit-btn" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Login -->
        <div id="login" class="card">
            <h2 style="margin-bottom: 1.5rem; font-weight: 500;">Test Authentication</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="emailLogin">Email Address</label>
                    <input type="email" id="emailLogin" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="passwordLogin">Password</label>
                    <input type="password" id="passwordLogin" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Response Area -->
        <div class="response-container" id="responseBox">
            <div class="response-header">
                <span style="font-weight: 500; color: var(--text-muted);">API Response</span>
                <span id="responseStatus" class="status-badge"></span>
            </div>
            <pre id="responseContent"></pre>
        </div>
    </div>

    <script>
        function getBaseUrl() {
            let url = document.getElementById('baseUrl').value.trim();
            if (url.endsWith('/')) {
                url = url.slice(0, -1);
            }
            return url;
        }

        function switchTab(event, tabId) {
            document.querySelectorAll('.card').forEach(card => {
                if (card.id !== '') { // Don't hide the config card
                   card.classList.remove('active');
                }
            });
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            // Hide response area when switching tabs
            document.getElementById('responseBox').style.display = 'none';
        }

        function toggleSpeciality(type) {
            const specGroup = document.getElementById('specialityGroup');
            const fileGroup = document.getElementById('signupFileGroup');
            if (type === 'doctor') {
                specGroup.style.display = 'block';
                fileGroup.style.display = 'block';
                // Make inputs required when doctor is selected
                document.getElementById('speciality').required = true;
                document.getElementById('signupFile').required = true;
            } else {
                specGroup.style.display = 'none';
                fileGroup.style.display = 'none';
                // Remove required attribute
                document.getElementById('speciality').required = false;
                document.getElementById('signupFile').required = false;
            }
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            
            if (isLoading) {
                btn.disabled = true;
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function showResponse(data, status) {
            const box = document.getElementById('responseBox');
            const statusBadge = document.getElementById('responseStatus');
            const content = document.getElementById('responseContent');
            
            box.style.display = 'block';
            content.textContent = JSON.stringify(data, null, 2);
            
            statusBadge.textContent = status + (status >= 200 && status < 300 ? ' OK' : ' Error');
            if (status >= 200 && status < 300) {
                statusBadge.className = 'status-badge status-success';
            } else {
                statusBadge.className = 'status-badge status-error';
            }
        }

        async function handleCertUpload(e) {
            e.preventDefault();
            setLoading('certBtn', true);
            
            const formData = new FormData();
            formData.append('file', document.getElementById('certFile').files[0]);

            const url = `${getBaseUrl()}/api/auth/doctor/certificate`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                showResponse(data, response.status);
            } catch (error) {
                showResponse({ error: error.message }, 500);
            } finally {
                setLoading('certBtn', false);
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            setLoading('signupBtn', true);
            
            const formData = new FormData();
            formData.append('fullName', document.getElementById('fullName').value);
            formData.append('email', document.getElementById('emailSignup').value);
            formData.append('password', document.getElementById('passwordSignup').value);
            
            const userType = document.getElementById('userType').value;
            formData.append('userType', userType);
            
            if (userType === 'doctor') {
                formData.append('speciality', document.getElementById('speciality').value);
                const file = document.getElementById('signupFile').files[0];
                if (file) formData.append('file', file);
            }

            const url = `${getBaseUrl()}/api/auth/signup`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                showResponse(data, response.status);
            } catch (error) {
                showResponse({ error: error.message }, 500);
            } finally {
                setLoading('signupBtn', false);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading('loginBtn', true);
            
            const payload = {
                email: document.getElementById('emailLogin').value,
                password: document.getElementById('passwordLogin').value
            };

            const url = `${getBaseUrl()}/api/auth/login`;
            try {
                console.log(`Login request sent to ${url}`);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                showResponse(data, response.status);
            } catch (error) {
                showResponse({ error: error.message }, 500);
            } finally {
                setLoading('loginBtn', false);
            }
        }
    </script>
</body>
</html>
